<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Flappy</title>
  <style>
    :root {
      --rose: #d6527f;
      --blush: #ffdce8;
      --ivory: #fffdf6;
      --gold: #d8ae62;
      --ink: #26303a;
      --panel: #ffffffd9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, #fff4f7 10%, #ffe7ef 34%, #ffd8e7 72%),
        repeating-linear-gradient(
          45deg,
          transparent 0,
          transparent 18px,
          rgba(214, 82, 127, 0.04) 18px,
          rgba(214, 82, 127, 0.04) 36px
        );
    }

    .wrap {
      display: grid;
      grid-template-columns: auto 240px;
      gap: 16px;
      align-items: start;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #efc1d2;
      background: #fff8fbcc;
      box-shadow: 0 16px 34px rgba(112, 56, 72, 0.16);
    }

    canvas {
      width: min(92vw, 420px);
      height: auto;
      aspect-ratio: 3 / 5;
      border-radius: 12px;
      border: 2px solid #f2bfd2;
      background: linear-gradient(#fff4f8, #ffe7f0 45%, #ffe0ec);
      touch-action: manipulation;
      display: block;
    }

    .side {
      background: var(--panel);
      border: 1px solid #f2c9d7;
      border-radius: 10px;
      padding: 12px;
      min-width: 220px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      color: #8f3658;
    }

    .stat {
      margin: 8px 0;
      font-size: 0.96rem;
    }

    .muted {
      color: #6f7a84;
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 0;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--rose), #bb406a);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.05);
    }

    @media (max-width: 760px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .side {
        width: min(92vw, 420px);
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <canvas id="game" width="420" height="700" aria-label="Wedding Flappy game board"></canvas>
    <aside class="side">
      <h1>Wedding Flappy</h1>
      <div class="stat">Score: <strong id="score">0</strong></div>
      <button id="restart">Restart</button>
      <p class="muted">
        Tap/click/space to jump.<br />
        Fly through floral arch gaps.<br />
        Avoid the pillars and floor.
      </p>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restart");

    const world = {
      gravity: 0.45,
      flap: -7.8,
      speed: 2.6,
      pipeGap: 185,
      pipeWidth: 84,
      spawnEvery: 1500,
      floorHeight: 86
    };

    const bird = {
      x: 95,
      y: 280,
      vy: 0,
      r: 18
    };

    let pipes = [];
    let score = 0;
    let gameOver = false;
    let started = false;
    let lastSpawn = 0;
    let lastFrame = 0;

    function resetGame() {
      pipes = [];
      score = 0;
      gameOver = false;
      started = false;
      lastSpawn = 0;
      bird.y = canvas.height * 0.42;
      bird.vy = 0;
      scoreEl.textContent = "0";
    }

    function spawnPipe() {
      const minTop = 90;
      const maxTop = canvas.height - world.floorHeight - world.pipeGap - 90;
      const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;

      pipes.push({
        x: canvas.width + 20,
        topHeight,
        counted: false
      });
    }

    function flap() {
      if (gameOver) return;
      if (!started) {
        started = true;
      }
      bird.vy = world.flap;
    }

    function circleRectCollision(cx, cy, radius, rx, ry, rw, rh) {
      const nearestX = Math.max(rx, Math.min(cx, rx + rw));
      const nearestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nearestX;
      const dy = cy - nearestY;
      return dx * dx + dy * dy <= radius * radius;
    }

    function update(dt, now) {
      if (!started || gameOver) return;

      bird.vy += world.gravity;
      bird.y += bird.vy;

      if (now - lastSpawn > world.spawnEvery) {
        spawnPipe();
        lastSpawn = now;
      }

      for (const pipe of pipes) {
        pipe.x -= world.speed * dt;

        const bottomY = pipe.topHeight + world.pipeGap;
        const hitsTop = circleRectCollision(
          bird.x,
          bird.y,
          bird.r,
          pipe.x,
          0,
          world.pipeWidth,
          pipe.topHeight
        );

        const hitsBottom = circleRectCollision(
          bird.x,
          bird.y,
          bird.r,
          pipe.x,
          bottomY,
          world.pipeWidth,
          canvas.height - world.floorHeight - bottomY
        );

        if (hitsTop || hitsBottom) {
          gameOver = true;
        }

        if (!pipe.counted && pipe.x + world.pipeWidth < bird.x) {
          pipe.counted = true;
          score += 1;
          scoreEl.textContent = String(score);
        }
      }

      pipes = pipes.filter(pipe => pipe.x + world.pipeWidth > -20);

      if (bird.y + bird.r >= canvas.height - world.floorHeight) {
        bird.y = canvas.height - world.floorHeight - bird.r;
        gameOver = true;
      }

      if (bird.y - bird.r <= 0) {
        bird.y = bird.r;
        bird.vy = 0;
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#fff7fa");
      sky.addColorStop(0.6, "#ffeaf2");
      sky.addColorStop(1, "#ffe1ec");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255,255,255,0.65)";
      for (let i = 0; i < 5; i++) {
        const x = 50 + i * 88;
        const y = 90 + (i % 2) * 35;
        ctx.beginPath();
        ctx.ellipse(x, y, 36, 20, 0, 0, Math.PI * 2);
        ctx.ellipse(x + 28, y + 3, 26, 16, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPipe(pipe) {
      const x = pipe.x;
      const w = world.pipeWidth;
      const topH = pipe.topHeight;
      const bottomY = topH + world.pipeGap;

      const grad = ctx.createLinearGradient(x, 0, x + w, 0);
      grad.addColorStop(0, "#be8a3a");
      grad.addColorStop(0.5, "#e1ba73");
      grad.addColorStop(1, "#bf8d43");
      ctx.fillStyle = grad;

      ctx.fillRect(x, 0, w, topH);
      ctx.fillRect(x, bottomY, w, canvas.height - world.floorHeight - bottomY);

      ctx.fillStyle = "#f5cade";
      for (let i = 0; i < 8; i++) {
        const flowerX = x + 12 + (i % 4) * 18;
        const flowerYTop = 20 + Math.floor(i / 4) * 18;
        const flowerYBottom = bottomY + 18 + Math.floor(i / 4) * 18;
        drawFlower(flowerX, flowerYTop, 5);
        drawFlower(flowerX, flowerYBottom, 5);
      }
    }

    function drawFlower(x, y, size) {
      ctx.fillStyle = "#f3b8cd";
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 * i) / 5;
        ctx.beginPath();
        ctx.arc(x + Math.cos(angle) * size, y + Math.sin(angle) * size, size * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = "#ffd97b";
      ctx.beginPath();
      ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBird() {
      const tilt = Math.max(-0.8, Math.min(0.8, bird.vy / 10));
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(tilt);

      ctx.fillStyle = "#fffdf8";
      ctx.beginPath();
      ctx.ellipse(0, 0, bird.r + 3, bird.r, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffd1df";
      ctx.beginPath();
      ctx.ellipse(-5, 4, bird.r * 0.65, bird.r * 0.48, -0.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#333";
      ctx.beginPath();
      ctx.arc(7, -5, 2.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#d6527f";
      ctx.fillRect(-3, -bird.r - 7, 15, 6);
      ctx.fillStyle = "#f0b7c9";
      ctx.beginPath();
      ctx.moveTo(4, -bird.r - 8);
      ctx.lineTo(-4, -bird.r - 15);
      ctx.lineTo(2, -bird.r - 4);
      ctx.lineTo(-8, -bird.r - 4);
      ctx.lineTo(0, -bird.r + 2);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#e3ab52";
      ctx.beginPath();
      ctx.moveTo(bird.r - 2, 2);
      ctx.lineTo(bird.r + 10, 5);
      ctx.lineTo(bird.r - 2, 8);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawFloor(now) {
      const y = canvas.height - world.floorHeight;
      ctx.fillStyle = "#f3c7d8";
      ctx.fillRect(0, y, canvas.width, world.floorHeight);

      const scroll = ((now * 0.12) % 50);
      ctx.fillStyle = "#e6a9be";
      for (let x = -50 + scroll; x < canvas.width + 50; x += 50) {
        ctx.fillRect(x, y + 20, 28, 8);
      }
    }

    function drawOverlay() {
      if (!started && !gameOver) {
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.fillRect(28, 220, canvas.width - 56, 180);
        ctx.fillStyle = "#8f3658";
        ctx.font = "700 30px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("Tap To Start", canvas.width / 2, 290);
        ctx.font = "18px Trebuchet MS";
        ctx.fillText("Guide the bride through the arches", canvas.width / 2, 330);
      }

      if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "700 38px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, 300);
        ctx.font = "22px Trebuchet MS";
        ctx.fillText("Score: " + score, canvas.width / 2, 340);
        ctx.font = "18px Trebuchet MS";
        ctx.fillText("Press Restart to play again", canvas.width / 2, 372);
      }
    }

    function render(now) {
      drawBackground();
      for (const pipe of pipes) {
        drawPipe(pipe);
      }
      drawFloor(now);
      drawBird();
      drawOverlay();
    }

    function gameLoop(timestamp) {
      if (!lastFrame) {
        lastFrame = timestamp;
      }
      const dt = Math.min(2.5, (timestamp - lastFrame) / 16.6667);
      lastFrame = timestamp;

      update(dt, timestamp);
      render(timestamp);
      requestAnimationFrame(gameLoop);
    }

    function onInput(event) {
      if (event) {
        event.preventDefault();
      }
      flap();
    }

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.key === " ") {
        onInput(event);
      }
    });

    canvas.addEventListener("pointerdown", onInput);
    restartBtn.addEventListener("click", resetGame);

    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
